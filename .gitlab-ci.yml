# GitLab CI/CD -- Validate aliases + sync to MinIO
# GitLab 16.7.10-ee (self-managed, internal network)
#
# IMPORTANT: This repo must contain ACTUAL hostnames, not aliases.
#            Aliases (*.kayhut.com) belong only in the public GitHub repo.
#
# Setup (one-time):
#   1. Go to Settings > CI/CD > Variables (masked + protected):
#        MINIO_ENDPOINT    = https://<real-minio-host>:9000
#        MINIO_ACCESS_KEY  = MinIO access key
#        MINIO_SECRET_KEY  = MinIO secret key
#   2. Ensure the runner tag matches your Windows runner

stages:
  - validate
  - sync

validate-no-aliases:
  stage: validate
  tags:
    - windows
    - docker
  script:
    - >
      powershell -NoProfile -ExecutionPolicy Bypass
      -File ci\Validate-NoAliases.ps1
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_MERGE_REQUEST_ID

sync-to-minio:
  stage: sync
  tags:
    - windows
    - docker
  needs:
    - validate-no-aliases
  variables:
    MINIO_BUCKET: "gitlab-runner-golden"
    MINIO_REGION: "us-east-1"
  script:
    - >
      powershell -NoProfile -ExecutionPolicy Bypass
      -File ci\Sync-ToMinio.ps1
      -Endpoint $env:MINIO_ENDPOINT
      -Bucket $env:MINIO_BUCKET
      -AccessKey $env:MINIO_ACCESS_KEY
      -SecretKey $env:MINIO_SECRET_KEY
      -Region $env:MINIO_REGION
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - Bootstrap-GitLabRunner.ps1
        - lib/**/*
        - phases/**/*
        - validation/**/*
        - scripts/**/*
        - tools/opencode/opencode.jsonc
    - if: $CI_COMMIT_BRANCH
      when: manual
      allow_failure: true
