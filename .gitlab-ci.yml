# GitLab CI/CD -- Validate aliases + sync to MinIO + post-sync verification.
# GitLab 16.7.10-ee (self-managed, internal network)
#
# IMPORTANT: This repo must contain ACTUAL hostnames, not aliases.
#            Aliases (*.kayhut.com) belong only in the public GitHub repo.
#
# Pipeline shape:
#   stage 1 -- validate-no-aliases : ci/Validate-NoAliases.ps1 scans every
#                                    file for public-repo leaks (aliases,
#                                    "Terrabookra" name)
#   stage 2 -- sync-to-minio       : ci/Sync-ToMinio.ps1 walks the $FileMap
#                                    and uploads each file via AWS SigV4
#   stage 3 -- verify-minio        : validation/Test-Dependencies.ps1 does
#                                    three checks: DNS resolution, S3 HEAD
#                                    (key exists), and S3 content-match
#                                    (MD5 of local repo file == ETag of the
#                                    MinIO object, single-PUT only). Catches
#                                    both missing keys AND stale/corrupt
#                                    blobs at the right key.
#
# Source of truth for what gets synced: ci/Sync-ToMinio.ps1 $FileMap. Adding
# a new lib/phase/script file requires (a) creating it under the right repo
# directory and (b) adding the entry to $FileMap. The 'changes:' globs below
# are wide enough to auto-trigger when any file in those directories changes.
#
# Setup (one-time):
#   1. Go to Settings > CI/CD > Variables (masked + protected):
#        MINIO_ENDPOINT      = https://<real-minio-host>:9000
#        MINIO_ACCESS_KEY    = MinIO access key
#        MINIO_SECRET_KEY    = MinIO secret key
#
#      BOOTSTRAP ROUTING (optional -- send Bootstrap-GitLabRunner.ps1 to a
#      separate bucket from everything else; same MinIO endpoint and creds):
#        BOOTSTRAP_S3_PATH   = <bucket>/<key>          (e.g. 'be1-scripts/runners/Bootstrap-GitLabRunner.ps1')
#                              When set, the bootstrap goes to the alternate
#                              bucket+key. All other files still go to
#                              MINIO_BUCKET. When unset, bootstrap goes to
#                              MINIO_BUCKET/Bootstrap-GitLabRunner.ps1.
#
#      ALIAS SUBSTITUTION (optional but recommended -- lets the public repo
#      hold aliases while internal CI publishes real hostnames to MinIO):
#        REAL_HARBOR_HOST    = <real Harbor FQDN>      (replaces 'harbor.kayhut.com')
#        REAL_GITLAB_HOST    = <real GitLab FQDN>      (replaces 'gitlab.kayhut.com')
#        REAL_MINIO_HOST     = <real MinIO FQDN>       (replaces 'kayhut-minio.com')
#        REAL_BE1_HOST       = <real Be1 FQDN>         (replaces 'be1.kayhut.com')
#        REAL_PROJECT_NAME   = <internal project name> (replaces 'Terrabookra' /
#                                                       'terrabookra')
#
#      Substitution is opt-in: if a REAL_* var is unset, the corresponding
#      alias passes through unchanged. Logic lives in ci/Substitute-Aliases.ps1
#      and runs identically in sync-to-minio (rewrites bytes before PUT) and
#      verify-minio (rewrites local bytes before MD5 compare, so content-match
#      still works).
#
#   2. Ensure the runner tag matches your Windows runner

stages:
  - validate
  - sync
  - verify

validate-no-aliases:
  stage: validate
  tags:
    - windows
    - docker
  script:
    - >
      powershell -NoProfile -ExecutionPolicy Bypass
      -File ci\Validate-NoAliases.ps1
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_MERGE_REQUEST_ID

sync-to-minio:
  stage: sync
  tags:
    - windows
    - docker
  needs:
    - validate-no-aliases
  variables:
    MINIO_BUCKET: "gitlab-runner-golden"
    MINIO_REGION: "us-east-1"
  script:
    - >
      powershell -NoProfile -ExecutionPolicy Bypass
      -File ci\Sync-ToMinio.ps1
      -Endpoint $env:MINIO_ENDPOINT
      -Bucket $env:MINIO_BUCKET
      -AccessKey $env:MINIO_ACCESS_KEY
      -SecretKey $env:MINIO_SECRET_KEY
      -Region $env:MINIO_REGION
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - Bootstrap-GitLabRunner.ps1
        - lib/**/*
        - phases/**/*
        - validation/**/*
        - scripts/**/*
        - tools/opencode/opencode.jsonc
    - if: $CI_COMMIT_BRANCH
      when: manual
      allow_failure: true

# Post-sync validator: HEAD-check every S3 key + Harbor manifest so a missing
# or forgotten upload fails CI rather than the next runner provision. Same
# script Phase 1 runs as a pre-flight; here we run it from the GitLab runner
# itself, which has DNS + cert access to MinIO and Harbor.
verify-minio:
  stage: verify
  tags:
    - windows
    - docker
  needs:
    - sync-to-minio
  variables:
    MINIO_BUCKET: "gitlab-runner-golden"
    MINIO_REGION: "us-east-1"
  script:
    - >
      powershell -NoProfile -ExecutionPolicy Bypass
      -File validation\Test-Dependencies.ps1
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - Bootstrap-GitLabRunner.ps1
        - lib/**/*
        - phases/**/*
        - validation/**/*
        - scripts/**/*
        - tools/opencode/opencode.jsonc
    - if: $CI_COMMIT_BRANCH
      when: manual
      allow_failure: true
