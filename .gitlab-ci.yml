# GitLab CI/CD -- infra_tf-compatible Aria catalog deployment for Windows runners.
# GitLab 16.7.10-ee (self-managed, internal network).
#
# Required masked/protected CI variables:
#   TF_VAR_vra_refresh_token  Aria CSP refresh token. Never commit it, pass it on
#                             the CLI, or store it in tfvars.
#   TF_VAR_vra_url            Optional override when not supplied by tfvars.
#   TF_VAR_vra_insecure       Optional true/false; true only for approved
#                             self-signed Aria endpoints.
#
# Required repo/runtime layout on the internal leg:
#   dist/bin/terraform.exe           Terraform 1.0.5
#   dist/providers/                  filesystem mirror containing vmware/vra 0.17.2
#   terraform/.terraform.lock.hcl    provider lock for vmware/vra, including windows_amd64
#   terraform/*.auto.tfvars          non-secret environment/catalog values

stages:
  - validate
  - plan
  - deploy

variables:
  TF_INPUT: "0"
  TF_IN_AUTOMATION: "true"
  TF_CLI_CONFIG_FILE: "$CI_PROJECT_DIR\\terraform\\terraform.rc"
  TERRAFORM_EXE: "$CI_PROJECT_DIR\\dist\\bin\\terraform.exe"

validate:
  stage: validate
  tags: [windows, docker]
  script:
    - powershell -NoProfile -ExecutionPolicy Bypass -Command "$bad=0; Get-ChildItem -Recurse -Filter *.ps1 | ForEach-Object { & .claude\verify-ps.ps1 -Path $_.FullName; if ($LASTEXITCODE -ne 0) { $bad++ } }; if ($bad) { exit 1 }"
    - powershell -NoProfile -ExecutionPolicy Bypass -File ci\Validate-NoAliases.ps1
    - powershell -NoProfile -ExecutionPolicy Bypass -File scripts\Test-AriaTerraformPreflight.ps1 -SkipAriaApi
    - '& "$env:TERRAFORM_EXE" -chdir=terraform init -backend=false'
    - '& "$env:TERRAFORM_EXE" -chdir=terraform validate'
  rules:
    - if: $CI_COMMIT_BRANCH

plan:
  stage: plan
  tags: [windows, docker]
  needs: [validate]
  script:
    - powershell -NoProfile -ExecutionPolicy Bypass -File scripts\Test-AriaTerraformPreflight.ps1
    - '& "$env:TERRAFORM_EXE" -chdir=terraform init'
    - '& "$env:TERRAFORM_EXE" -chdir=terraform plan -out=tfplan'
  artifacts:
    paths:
      - terraform/tfplan
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_BRANCH

deploy:
  stage: deploy
  tags: [windows, docker]
  needs: [plan]
  script:
    - powershell -NoProfile -ExecutionPolicy Bypass -File scripts\Test-AriaTerraformPreflight.ps1
    - '& "$env:TERRAFORM_EXE" -chdir=terraform init'
    - '& "$env:TERRAFORM_EXE" -chdir=terraform apply -auto-approve tfplan'
  rules:
    - if: $CI_COMMIT_BRANCH == "terraform"
      when: manual
      allow_failure: false
