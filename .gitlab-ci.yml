# GitLab CI/CD -- Packer/Terraform golden-image pipeline (replaces the Be1 +
# MinIO-sync pipeline). Runs on the INTERNAL GitLab (16.7.10-ee).
#
# Pipeline shape (maps to the locked build-vs-deploy decisions):
#   validate       -- static checks: PSScriptAnalyzer + verify-ps + Validate-NoAliases,
#                     packer fmt/validate, terraform fmt/validate, and Test-BuildInputs
#                     (repo artifacts present via Git LFS + GitLab registry reachable).
#   build          -- `packer build` of the golden template; the BUILD-GATE
#                     (Invoke-FinalValidation) runs inside Phase 3 and fails the build.
#   image-test     -- ACCEPTANCE-GATE: Terraform deploys ONE runner from the fresh
#                     template, it self-registers from guestinfo, runs representative
#                     pipelines (incl. heavy pytest-xdist), asserts exit 0 + wall-time
#                     <= the Be1 baseline, then destroys it.
#   promote        -- stamp 2.x.y+<gitsha> from the build manifest (not hand-edited)
#                     and mark the template "released".
#   deploy         -- MANUAL: `terraform apply` to roll the fleet.
#
# Secrets are CI masked/protected variables (never committed):
#   VSPHERE_SERVER VSPHERE_USER VSPHERE_PASSWORD   (svc-packer / svc-terraform)
#   REGISTRY_USER REGISTRY_PASS                    (GitLab Container Registry token)
#   REAL_GITLAB_HOST REAL_GITLAB_REGISTRY          (optional alias overrides)
# Offline mirrors are pre-staged on the runner: PACKER_PLUGIN_PATH (vsphere plugin)
# and TF_CLI_CONFIG_FILE -> terraform/terraform.rc (provider filesystem_mirror).

stages:
  - validate
  - build
  - image-test
  - promote
  - deploy

# ----------------------------------------------------------------------------
validate:
  stage: validate
  tags: [windows, docker]
  script:
    # verify-ps is single-file -- run it over every tracked .ps1; fail if any fail.
    - powershell -NoProfile -ExecutionPolicy Bypass -Command "$bad=0; Get-ChildItem -Recurse -Filter *.ps1 | ForEach-Object { & .claude\verify-ps.ps1 -Path $_.FullName; if ($LASTEXITCODE -ne 0) { $bad++ } }; if ($bad) { exit 1 }"
    - powershell -NoProfile -ExecutionPolicy Bypass -File ci\Validate-NoAliases.ps1
    # LFS binaries must be materialized + GitLab registry reachable.
    - git lfs fsck
    - powershell -NoProfile -ExecutionPolicy Bypass -File validation\Test-BuildInputs.ps1
    - packer fmt -check -recursive packer
    - packer validate -var-file=packer\base\example.pkrvars.hcl packer\base
    - packer validate -var-file=packer\golden\example.pkrvars.hcl packer\golden
    - terraform -chdir=terraform fmt -check
    - terraform -chdir=terraform init -backend=false
    - terraform -chdir=terraform validate
  rules:
    - if: $CI_COMMIT_BRANCH == "terraform"
    - if: $CI_MERGE_REQUEST_ID

# ----------------------------------------------------------------------------
build:
  stage: build
  tags: [windows, docker]
  needs: [validate]
  variables:
    PKR_VAR_vcenter_server: $VSPHERE_SERVER
    PKR_VAR_vcenter_username: $VSPHERE_USER
    PKR_VAR_vcenter_password: $VSPHERE_PASSWORD
    PKR_VAR_registry_user: $REGISTRY_USER
    PKR_VAR_registry_pass: $REGISTRY_PASS
    PKR_VAR_real_gitlab_host: $REAL_GITLAB_HOST
    PKR_VAR_real_gitlab_registry: $REAL_GITLAB_REGISTRY
  script:
    # The golden build clones the base template (built separately on refresh).
    # repo_root is the checkout dir; the build-gate (Invoke-FinalValidation) runs
    # inside Phase 3 and fails `packer build` on a bad image.
    - packer build -var "repo_root=$CI_PROJECT_DIR" packer\golden
  artifacts:
    paths:
      - packer/golden/manifest.json
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == "terraform"

# ----------------------------------------------------------------------------
image-test:
  stage: image-test
  tags: [windows, docker]
  needs: [build]
  script:
    # Deploy one runner from the freshly built template, let it self-register,
    # run representative pipelines, assert success + wall-time, then destroy.
    - terraform -chdir=terraform init
    - terraform -chdir=terraform apply -auto-approve -var-file=image-test.auto.tfvars
    - powershell -NoProfile -ExecutionPolicy Bypass -File ci\Invoke-AcceptanceGate.ps1
    - terraform -chdir=terraform destroy -auto-approve -var-file=image-test.auto.tfvars
  rules:
    - if: $CI_COMMIT_BRANCH == "terraform"

# ----------------------------------------------------------------------------
promote:
  stage: promote
  tags: [windows, docker]
  needs: [image-test]
  script:
    # Version = 2.x.y+<gitsha> derived from the manifest, NOT hand-edited.
    - powershell -NoProfile -ExecutionPolicy Bypass -File ci\Publish-GoldenManifest.ps1 -ManifestPath packer\golden\manifest.json -GitSha $CI_COMMIT_SHORT_SHA
  rules:
    - if: $CI_COMMIT_BRANCH == "terraform"

# ----------------------------------------------------------------------------
deploy:
  stage: deploy
  tags: [windows, docker]
  needs: [promote]
  script:
    - terraform -chdir=terraform init
    - terraform -chdir=terraform apply -auto-approve
  rules:
    - if: $CI_COMMIT_BRANCH == "terraform"
      when: manual
